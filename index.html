        <h1>Pass the Pump</h1>
        <h2>See Shell. We Shall. Fill Up No More!</h2>
        <p>Say it loud. Say it proud. And get the gas out of our government.</p>

        <h3>My Voice + Your Voice = Our Country</h3>
        <p>NOT CORPORATIONS. NOT FOREIGN NATIONS. NOT ALGORITHMS. NOT AI.</p>
        <p>CITIZENS UNITED = CITIZENS DIVIDED. Because they know: me divided by you cannot stand. But me + you is not equal to corporations.</p>

        <h3>How This Works</h3>
        <p>By all of us skipping past Shell, we force CEO Wael Sawan to take the pledge: "We Pledge to Get Our Money Out of Your Government!" On YouTube. For all of us to see.</p>
        <ol>
          <li>See a Shell station</li>
          <li>Leave Shell</li>
          <li>Fill up Anywhere Else</li>
        </ol>
        <p>They Must Comply — Or We Will Drive By.</p>

        <h3>The Candidate Pledge</h3>
        <p>For candidates in the upcoming elections — "I pledge to co-sponsor legislation to:"</p>
        <ol>
          <li>Pass the DISCLOSE Act — force all political spending over $10K into the open.</li>
          <li>Make fossil fuel subsidies conditional — any company that spends on politics loses their Section 263(c) tax deduction. Drill or lobby. Not both.</li>
          <li>Make lobbying non-deductible — corporations can't write off buying Congress.</li>
          <li>Support a constitutional amendment to overturn Citizens United.</li>
        </ol>
        <p>35 Senate seats up in November 2026. On this, there are no sides. Just Us vs. Them.</p>

        <h3>The Receipts</h3>
        <p>Receipt 1 — THE LIFEBOAT: In 1991, Shell made a film called "Climate of Concern." They warned of floods, extreme weather, rising seas. Then they spent three decades funding climate denial. And quietly raised their own oil rigs higher out of the water! They built themselves a lifeboat while telling us the ship wasn't sinking.</p>
        <p>Receipt 2 — THE CELEBRATION: In 2022, Shell posted $39.9 BILLION — their highest profit in 115 years. They didn't lower prices. They didn't increase supply. They bought back their own stock. Our inflation wasn't an accident. It was their business model!</p>
        <p>Receipt 3 — THE DOUBLE CHARGE: Every gallon you buy, you pay for twice. $40 at the pump. $20 BILLION per year in oil subsidies on your taxes. They spend $7M/yr lobbying Congress to keep a tax loophole from 1913 alive.</p>

        <h3>A Note About The Franchisees</h3>
        <p>The hard workers and franchise owners aren't the enemy. They wake up early and work really late. They built something from nothing. They serve their community every single day. Honk when you drive past. Wave. Let them know this isn't about them — it's about the name on the sign above their head. When the parent company pledges, we come back. Louder than before.</p>

        <h3>This isn't about their Profit.</h3>
        <p>It's about their Brand. And about us finally taking a stand together.</p>
        <p>We Are The UNITED States!</p>

        <p>One company at a time. Until they all comply. They've been playing a shell game with our money. Now we're playing one with their brand.</p>

        <p>Join at <a href="https://passthepump.org">passthepump.org</a></p>
